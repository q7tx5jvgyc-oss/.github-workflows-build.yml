name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang git curl
          curl -LO https://github.com/theos/ldid/raw/master/ldid
          chmod +x ldid
          sudo mv ldid /usr/bin/ldid
          git clone --recursive https://github.com/theos/theos.git /home/runner/theos

      - name: Build Tweak
        run: |
          export THEOS=/home/runner/theos
          export PATH=$THEOS/bin:$PATH
          # هذا السطر هو الحل: التأكد من وجودنا في مجلد العمل الرئيسي
          cd $GITHUB_WORKSPACE
          # نستخدم ls للتحقق من وجود الملفات قبل البناء
          ls -l Makefile
          make
          make package

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: packages/*.deb
