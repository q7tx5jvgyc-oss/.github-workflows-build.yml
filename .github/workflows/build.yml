name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/theos/theos/sdks:latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          # التوجه مباشرة للبناء دون الحاجة لتحميل الـ SDK يدوياً
          make clean
          make
          make package
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: packages/*.deb
