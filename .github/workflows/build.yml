name: Build MoustacheClicker

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang git
          # تحميل أداة التوقيع ldid يدوياً لتجاوز الخطأ
          curl -LO https://github.com/theos/ldid/raw/master/ldid
          chmod +x ldid
          sudo mv ldid /usr/bin/
          # تحميل بيئة Theos
          git clone --recursive https://github.com/theos/theos.git /home/runner/theos

      - name: Build Tweak
        run: |
          export THEOS=/home/runner/theos
          export PATH=$THEOS/bin:$PATH
          make clean
          make package

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoustacheClicker_Deb
          path: packages/*.deb
