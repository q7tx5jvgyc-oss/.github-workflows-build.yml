name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Theos and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang make git
          git clone --recursive https://github.com/theos/theos.git /home/runner/theos
      - name: Build Tweak
        run: |
          export THEOS=/home/runner/theos
          export PATH=$THEOS/bin:$PATH
          # التوجه المباشر للبناء
          make
          make package
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: packages/*.deb
